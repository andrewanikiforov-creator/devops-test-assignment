version: '3.8'

services:
  # Наше приложение, которое покажет заголовки
  app:
    image: mendhak/http-https-echo:latest
    container_name: backend-app
    networks:
      - devops-net

  # Три инстанса Nginx
  nginx1:
    image: nginx:alpine
    container_name: nginx1
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    environment:
      - NODE_ID=nginx1
    networks:
      - devops-net
    ports:
      - "8081:80"

  nginx2:
    image: nginx:alpine
    container_name: nginx2
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    environment:
      - NODE_ID=nginx2
    networks:
      - devops-net
    ports:
      - "8082:80"

  nginx3:
    image: nginx:alpine
    container_name: nginx3
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    environment:
      - NODE_ID=nginx3
    networks:
      - devops-net
    ports:
      - "8083:80"

networks:
  devops-net:
    driver: bridge
