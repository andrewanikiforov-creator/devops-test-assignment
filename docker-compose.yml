version: '3.8'

services:
  app:
    # Использую готовый образ, который просто выводит все заголовки
    image: mendhak/http-https-echo:latest
    container_name: backend-app
    networks:
      - devops-net
    ports:
      - "8080:8080" # Явно пробрасываю порт, чтобы приложение было доступно

  nginx1:
    image: nginx:alpine
    container_name: nginx1
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf.template:ro
    environment:
      - NEXT_HOP=nginx2
    command: /bin/sh -c "envsubst '$$NEXT_HOP' < /etc/nginx/nginx.conf.template > /etc/nginx/nginx.conf && exec nginx -g 'daemon off;'"
    networks:
      - devops-net
    ports:
      - "8081:80"

  nginx2:
    image: nginx:alpine
    container_name: nginx2
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf.template:ro
    environment:
      - NEXT_HOP=nginx3
    command: /bin/sh -c "envsubst '$$NEXT_HOP' < /etc/nginx/nginx.conf.template > /etc/nginx/nginx.conf && exec nginx -g 'daemon off;'"
    networks:
      - devops-net

  nginx3:
    image: nginx:alpine
    container_name: nginx3
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf.template:ro
    environment:
      - NEXT_HOP=app:8080
    command: /bin/sh -c "envsubst '$$NEXT_HOP' < /etc/nginx/nginx.conf.template > /etc/nginx/nginx.conf && exec nginx -g 'daemon off;'"
    networks:
      - devops-net

networks:
  devops-net:
    driver: bridge
