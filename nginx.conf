events {
    worker_connections 1024;
}

http {
    # DNS-резолвер Docker
    resolver 127.0.0.11 valid=30s;
    set_real_ip_from 172.17.0.0/16;

    # Настройки доверенных сетей для защиты от спуфинга
    set_real_ip_from  172.16.0.0/12;
    set_real_ip_from  192.168.0.0/16;
    set_real_ip_from  127.0.0.1;
    real_ip_header    X-Forwarded-For;
    real_ip_recursive on;

    server {
        listen 80;

        location / {
            # Добавляю IP текущего узла в цепочку
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;

            # Переменная $NEXT_HOP будет передана через docker-compose.yml
            # Использование переменной здесь предотвращает цикл
            proxy_pass http://$NEXT_HOP;
        }
    }
}
